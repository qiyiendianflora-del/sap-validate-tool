name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyqt5 openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name SAP凭证校验工具 validate_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAP凭证校验工具
          path: dist/SAP凭证校验工具.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "SAP凭证校验工具 Build #${{ github.run_number }}"
          files: dist/SAP凭证校验工具.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
